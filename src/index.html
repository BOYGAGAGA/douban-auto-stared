<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豆瓣自动标记</title>
  <link rel="stylesheet" href="styles/douban.css">
</head>
<body>
  <div class="nav-bar">
    <div class="nav-bar-inner">
      <div class="nav-left">
        <img src="../icon.png" class="logo-icon" />
        <span class="logo">豆瓣自动标记</span>
      </div>
      <div class="nav-right">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="输入名称（多个用逗号/空格/换行分隔）" autofocus />
          <button id="searchBtn" class="search-btn">搜索</button>
          <button id="settingsBtn" class="btn-settings" title="设置">⚙</button>
        </div>
      </div>
    </div>
  </div>

  <div class="main-wrapper">
    <div class="main-content">
      <div class="content-left">
        <div class="module">
          <div class="target-bar">
            <label class="target-item"><input type="checkbox" id="targetDouban" checked> 豆瓣</label>
            <label class="target-item"><input type="checkbox" id="targetResource"> 资源站</label>
          </div>
        </div>

        <div class="module">
          <div class="drop-zone" id="dropZone">
            <div class="drop-zone-content" id="dropContent">
              <div class="drop-icon">📋</div>
              <p><strong>Ctrl+V</strong> 粘贴</p>
              <p class="sub-hint">拖拽图片 · <label class="file-label" for="fileInput">选择文件</label></p>
              <input type="file" id="fileInput" accept="image/*" style="display:none" />
            </div>
            <div class="drop-zone-preview" id="previewArea" style="display:none">
              <img id="previewImage" />
              <div id="ocrResult" class="ocr-result"></div>
              <button class="btn-clear" id="clearImage">✕ 清除</button>
            </div>
          </div>
        </div>

        <div class="module">
          <div class="module-title">
            <span class="title-text">历史</span>
            <span class="title-extra" id="clearHistory" style="cursor:pointer;color:#2777bb">清空</span>
          </div>
          <div class="history-list" id="historyList">
            <p class="empty-hint">暂无记录</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="settingsModal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">设置</span>
        <button class="modal-close" id="closeSettings">✕</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label class="setting-label">腾讯云OCR API</label>
          <p class="setting-hint">图片文字识别，免费1000次/月</p>
          <input type="text" id="inputSecretId" placeholder="SecretId" class="setting-input" />
          <input type="text" id="inputSecretKey" placeholder="SecretKey" class="setting-input" />
          <button id="saveSettings" class="btn-save">保存</button>
        </div>
        <div class="setting-group">
          <label class="setting-label">如何获取？</label>
          <ol class="setting-steps">
            <li>访问 <a href="#" onclick="openUrl('https://console.cloud.tencent.com/cam/capi')">腾讯云密钥管理</a></li>
            <li>登录/注册腾讯云账号</li>
            <li>点击「新建密钥」获取</li>
          </ol>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== 状态 =====
    const state = {
      keyword: '',
      history: JSON.parse(localStorage.getItem('douban-history') || '[]'),
      targets: JSON.parse(localStorage.getItem('douban-targets') || '{"douban":true,"resource":false}'),
      tencentId: localStorage.getItem('tencent-secret-id') || '',
      tencentKey: localStorage.getItem('tencent-secret-key') || ''
    };

    // ===== DOM =====
    const $ = id => document.getElementById(id);
    const el = {
      searchInput: $('searchInput'), searchBtn: $('searchBtn'),
      dropZone: $('dropZone'), dropContent: $('dropContent'),
      fileInput: $('fileInput'), previewArea: $('previewArea'),
      previewImage: $('previewImage'), ocrResult: $('ocrResult'),
      clearImage: $('clearImage'), targetDouban: $('targetDouban'),
      targetResource: $('targetResource'), historyList: $('historyList'),
      clearHistory: $('clearHistory'), settingsBtn: $('settingsBtn'),
      settingsModal: $('settingsModal'), closeSettings: $('closeSettings'),
      inputSecretId: $('inputSecretId'), inputSecretKey: $('inputSecretKey'),
      saveSettings: $('saveSettings')
    };

    // ===== 初始化 =====
    el.targetDouban.checked = state.targets.douban;
    el.targetResource.checked = state.targets.resource;
    el.inputSecretId.value = state.tencentId;
    el.inputSecretKey.value = state.tencentKey;
    renderHistory();

    // ===== 分隔符解析（逗号/空格/换行/顿号/分号） =====
    function parseKeywords(text) {
      if (!text) return [];
      // 用逗号、顿号、分号、换行分隔
      const items = text.split(/[,，、;；\n]+/).map(s => s.trim()).filter(s => s.length > 0);
      return [...new Set(items)]; // 去重
    }

    // ===== 打开URL =====
    async function openUrl(url) {
      try { await window.electronAPI.openExternal(url); } catch (e) { console.error(e); }
    }

    // ===== 搜索 =====
    function doSearch(text) {
      text = (text || '').trim();
      if (!text) return;

      const keywords = parseKeywords(text);
      if (keywords.length === 0) return;

      // 每个关键词单独搜索
      keywords.forEach(keyword => {
        state.keyword = keyword;
        addHistory(keyword);

        if (el.targetDouban.checked) {
          openUrl(`https://www.douban.com/search?q=${encodeURIComponent(keyword)}`);
        }
        if (el.targetResource.checked) {
          openUrl(`https://www.xn--wcv59z.com/search?q=${encodeURIComponent(keyword)}&type=&mode=1`);
        }
      });

      el.searchInput.value = keywords.join(', ');
    }

    // ===== 搜索按钮/回车 =====
    el.searchBtn.addEventListener('click', () => doSearch(el.searchInput.value));
    el.searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); doSearch(el.searchInput.value); }
    });

    // ===== 设置弹窗 =====
    el.settingsBtn.addEventListener('click', () => el.settingsModal.style.display = 'flex');
    el.closeSettings.addEventListener('click', () => el.settingsModal.style.display = 'none');
    el.settingsModal.addEventListener('click', e => { if (e.target === el.settingsModal) el.settingsModal.style.display = 'none'; });
    el.saveSettings.addEventListener('click', () => {
      state.tencentId = el.inputSecretId.value.trim();
      state.tencentKey = el.inputSecretKey.value.trim();
      localStorage.setItem('tencent-secret-id', state.tencentId);
      localStorage.setItem('tencent-secret-key', state.tencentKey);
      el.settingsModal.style.display = 'none';
      alert('设置已保存');
    });
    document.querySelectorAll('.setting-input').forEach(input => {
      input.addEventListener('keydown', e => e.stopPropagation());
    });

    // ===== 目标选择 =====
    function saveTargets() {
      state.targets = { douban: el.targetDouban.checked, resource: el.targetResource.checked };
      localStorage.setItem('douban-targets', JSON.stringify(state.targets));
    }
    el.targetDouban.addEventListener('change', saveTargets);
    el.targetResource.addEventListener('change', saveTargets);

    // ===== 图片处理 =====
    el.dropZone.addEventListener('dragover', e => { e.preventDefault(); el.dropZone.classList.add('drag-over'); });
    el.dropZone.addEventListener('dragleave', () => el.dropZone.classList.remove('drag-over'));
    el.dropZone.addEventListener('drop', e => {
      e.preventDefault(); el.dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length > 0 && e.dataTransfer.files[0].type.startsWith('image/')) handleImage(e.dataTransfer.files[0]);
    });
    el.dropZone.addEventListener('click', e => {
      if (e.target.classList.contains('file-label') || e.target.closest('.file-label')) return;
      if (e.target.classList.contains('btn-clear') || e.target.closest('.btn-clear')) return;
      el.fileInput.click();
    });
    el.fileInput.addEventListener('change', e => { if (e.target.files.length > 0) handleImage(e.target.files[0]); });

    // ===== 粘贴 =====
    document.addEventListener('paste', async e => {
      if (el.settingsModal.style.display === 'flex') return;
      if (document.activeElement === el.searchInput) return;
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          if (item.getAsFile()) handleImage(item.getAsFile());
          return;
        }
      }
      const text = e.clipboardData.getData('text/plain');
      if (text && text.trim()) doSearch(text.trim());
    });

    el.clearImage.addEventListener('click', e => {
      e.stopPropagation();
      el.previewArea.style.display = 'none';
      el.dropContent.style.display = 'block';
      el.previewImage.src = '';
      el.ocrResult.textContent = '';
      el.fileInput.value = '';
    });

    async function handleImage(file) {
      const reader = new FileReader();
      reader.onload = e => {
        el.previewImage.src = e.target.result;
        el.previewArea.style.display = 'flex';
        el.dropContent.style.display = 'none';
      };
      reader.readAsDataURL(file);

      el.ocrResult.textContent = '识别中...';
      try {
        const base64 = await fileToBase64(file);
        const text = await doOCR(base64, file.type);
        if (text && text.trim().length > 1) {
          const cleaned = cleanText(text);
          el.ocrResult.textContent = `识别结果: ${cleaned}`;
          el.searchInput.value = cleaned;
          doSearch(cleaned);
        } else {
          el.ocrResult.textContent = '未能识别';
        }
      } catch (err) {
        el.ocrResult.textContent = `识别失败: ${err.message}`;
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ===== 腾讯云OCR =====
    async function callTencentOCR(imgBase64) {
      if (!state.tencentId || !state.tencentKey) throw new Error('请先配置腾讯云API密钥');

      const action = 'GeneralBasicOCR';
      const host = 'ocr.tencentcloudapi.com';
      const body = JSON.stringify({ ImageBase64: imgBase64 });
      const timestamp = Math.floor(Date.now() / 1000);
      const date = new Date(timestamp * 1000).toISOString().split('T')[0];

      async function hmac256(key, msg) {
        const enc = new TextEncoder();
        const k = typeof key === 'string' ? enc.encode(key) : key;
        const cryptoKey = await crypto.subtle.importKey('raw', k, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
        return new Uint8Array(await crypto.subtle.sign('HMAC', cryptoKey, enc.encode(msg)));
      }
      async function sha256(msg) {
        const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
      }

      const ct = 'application/json; charset=utf-8';
      const ch = `content-type:${ct}\nhost:${host}\nx-tc-action:${action.toLowerCase()}\n`;
      const sh = 'content-type;host;x-tc-action';
      const cr = `POST\n/\n\n${ch}\n${sh}\n${await sha256(body)}`;
      const cs = `${date}/ocr/tc3_request`;
      const sts = `TC3-HMAC-SHA256\n${timestamp}\n${cs}\n${await sha256(cr)}`;
      const sig = Array.from(await hmac256(await hmac256(await hmac256(`TC3${state.tencentKey}`, date), 'ocr'), 'tc3_request')
        .then ? await hmac256(await hmac256(await hmac256(`TC3${state.tencentKey}`, date), 'ocr'), 'tc3_request') : new Uint8Array(0)).map(b => b.toString(16).padStart(2, '0')).join('');

      // Fix: compute signature properly
      const sd = await hmac256(`TC3${state.tencentKey}`, date);
      const ss = await hmac256(sd, 'ocr');
      const sk = await hmac256(ss, 'tc3_request');
      const sigBytes = await hmac256(sk, sts);
      const signature = Array.from(sigBytes).map(b => b.toString(16).padStart(2, '0')).join('');

      const resp = await fetch(`https://${host}`, {
        method: 'POST',
        headers: {
          'Authorization': `TC3-HMAC-SHA256 Credential=${state.tencentId}/${cs}, SignedHeaders=${sh}, Signature=${signature}`,
          'Content-Type': ct, 'Host': host,
          'X-TC-Action': action, 'X-TC-Version': '2018-11-19',
          'X-TC-Timestamp': String(timestamp), 'X-TC-Region': 'ap-beijing'
        },
        body
      });

      const result = await resp.json();
      return (result.Response?.TextDetections || []).map(i => i.DetectedText).join(' ');
    }

    async function doOCR(base64, mimeType) {
      if (state.tencentId && state.tencentKey) {
        try { return await callTencentOCR(base64); } catch (e) { console.error('腾讯OCR失败:', e); }
      }
      // 降级: Tesseract.js
      if (window.Tesseract) {
        return (await window.Tesseract.recognize(`data:${mimeType};base64,${base64}`, 'chi_sim+eng')).data.text;
      }
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        s.onload = async () => { try { resolve((await window.Tesseract.recognize(`data:${mimeType};base64,${base64}`, 'chi_sim+eng')).data.text); } catch (e) { reject(e); } };
        s.onerror = () => reject(new Error('无法加载OCR库'));
        document.head.appendChild(s);
      });
    }

    function cleanText(text) {
      return text.replace(/\s+/g, ' ').replace(/[「」『』【】《》\[\]\{\}]/g, '').trim().substring(0, 100);
    }

    // ===== 历史记录 =====
    function addHistory(text) {
      const now = new Date();
      const time = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
      state.history.unshift({ text, time });
      if (state.history.length > 20) state.history.pop();
      localStorage.setItem('douban-history', JSON.stringify(state.history));
      renderHistory();
    }

    function deleteHistory(index) {
      state.history.splice(index, 1);
      localStorage.setItem('douban-history', JSON.stringify(state.history));
      renderHistory();
    }

    function renderHistory() {
      if (state.history.length === 0) {
        el.historyList.innerHTML = '<p class="empty-hint">暂无记录</p>';
        return;
      }
      el.historyList.innerHTML = state.history.map((item, i) =>
        `<div class="history-item">
          <span class="history-text" onclick="doSearch('${item.text.replace(/'/g, "\\'")}')">${item.text}</span>
          <span class="history-time">${item.time}</span>
          <span class="history-delete" onclick="deleteHistory(${i})" title="删除">✕</span>
        </div>`
      ).join('');
    }

    el.clearHistory.addEventListener('click', () => {
      state.history = [];
      localStorage.setItem('douban-history', '[]');
      renderHistory();
    });
  </script>
</body>
</html>
