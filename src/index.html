<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豆瓣自动标记</title>
  <link rel="stylesheet" href="styles/douban.css">
</head>
<body>
  <!-- 导航栏 -->
  <div class="nav-bar">
    <div class="nav-bar-inner">
      <div class="nav-left">
        <span class="logo">豆瓣自动标记</span>
      </div>
      <div class="nav-right">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="输入名称，回车搜索..." autofocus />
          <button id="searchBtn" class="search-btn">搜索</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main-wrapper">
    <!-- 搜索范围选择 -->
    <div class="scope-bar">
      <label class="scope-label">搜索范围：</label>
      <label class="scope-item"><input type="checkbox" id="scopeMovie" checked> 电影</label>
      <label class="scope-item"><input type="checkbox" id="scopeBook" checked> 书籍</label>
      <label class="scope-item"><input type="checkbox" id="scopeMusic" checked> 音乐</label>
      <label class="scope-item"><input type="checkbox" id="scopeGame" checked> 游戏</label>
    </div>

    <div class="main-content">
      <!-- 输入区 -->
      <div class="content-left">
        <div class="module">
          <div class="module-title">
            <span class="title-text">输入</span>
            <span class="title-dots">······</span>
            <span class="title-extra">粘贴文字或图片</span>
          </div>
          <div class="drop-zone" id="dropZone">
            <div class="drop-zone-content" id="dropContent">
              <div class="drop-icon">📋</div>
              <p><strong>Ctrl+V</strong> 粘贴文字或图片</p>
              <p class="sub-hint">或拖拽图片 · <label class="file-label" for="fileInput">选择文件</label></p>
              <input type="file" id="fileInput" accept="image/*" style="display:none" />
            </div>
            <div class="drop-zone-preview" id="previewArea" style="display:none">
              <img id="previewImage" />
              <div id="ocrResult" class="ocr-result"></div>
              <button class="btn-clear" id="clearImage">✕ 清除</button>
            </div>
          </div>
        </div>

        <!-- 操作结果 -->
        <div class="module" id="resultModule" style="display:none">
          <div class="module-title">
            <span class="title-text">搜索</span>
            <span class="title-dots">······</span>
            <span class="title-extra" id="resultKeyword"></span>
          </div>
          <div class="result-actions">
            <button class="btn-action btn-douban" id="btnDouban">🔍 在豆瓣中搜索</button>
            <button class="btn-action btn-resource" id="btnResource">📦 搜索资源</button>
          </div>
          <div class="result-info" id="resultInfo"></div>
        </div>

        <!-- 历史记录 -->
        <div class="module">
          <div class="module-title">
            <span class="title-text">历史</span>
            <span class="title-dots">······</span>
            <span class="title-extra" id="clearHistory" style="cursor:pointer;color:#2777bb">清空</span>
          </div>
          <div class="history-list" id="historyList">
            <p class="empty-hint">暂无记录</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentKeyword = '';
    let searchHistory = JSON.parse(localStorage.getItem('douban-history') || '[]');

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const dropZone = document.getElementById('dropZone');
    const dropContent = document.getElementById('dropContent');
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const previewImage = document.getElementById('previewImage');
    const ocrResult = document.getElementById('ocrResult');
    const clearImage = document.getElementById('clearImage');
    const resultModule = document.getElementById('resultModule');
    const resultKeyword = document.getElementById('resultKeyword');
    const btnDouban = document.getElementById('btnDouban');
    const btnResource = document.getElementById('btnResource');
    const resultInfo = document.getElementById('resultInfo');
    const historyList = document.getElementById('historyList');
    const clearHistory = document.getElementById('clearHistory');

    const scopeMovie = document.getElementById('scopeMovie');
    const scopeBook = document.getElementById('scopeBook');
    const scopeMusic = document.getElementById('scopeMusic');
    const scopeGame = document.getElementById('scopeGame');

    renderHistory();

    async function openUrl(url) {
      try {
        await window.electronAPI.openExternal(url);
      } catch (err) {
        console.error('打开链接错误:', err);
      }
    }

    searchBtn.addEventListener('click', () => doSearch(searchInput.value));
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch(searchInput.value);
    });

    function doSearch(text) {
      text = (text || '').trim();
      if (!text) return;
      currentKeyword = text;
      searchInput.value = text;
      addHistory(text);
      showResult(text);
      openDouban(text);
    }

    function showResult(keyword) {
      resultModule.style.display = 'block';
      resultKeyword.textContent = keyword;
      resultInfo.innerHTML = `<p>搜索: <strong>${keyword}</strong></p>`;
    }

    // 获取选中的分类
    function getSelectedCategories() {
      const cats = [];
      if (scopeMovie.checked) cats.push({ name: '电影', cat: '1002', url: 'https://www.douban.com/search' });
      if (scopeBook.checked) cats.push({ name: '书籍', cat: '1001', url: 'https://www.douban.com/search' });
      if (scopeMusic.checked) cats.push({ name: '音乐', cat: '1003', url: 'https://www.douban.com/search' });
      if (scopeGame.checked) cats.push({ name: '游戏', cat: '1013', url: 'https://www.douban.com/search' });
      return cats;
    }

    // 打开豆瓣搜索（根据选中范围）
    function openDouban(keyword) {
      const categories = getSelectedCategories();
      if (categories.length === 0) {
        resultInfo.innerHTML += '<p style="color:#cc3333">请至少选择一个搜索范围</p>';
        return;
      }

      categories.forEach(cat => {
        const url = `${cat.url}?q=${encodeURIComponent(keyword)}&cat=${cat.cat}`;
        openUrl(url);
        resultInfo.innerHTML += `<p style="color:#218c38">✓ 已打开豆瓣${cat.name}搜索</p>`;
      });
    }

    btnDouban.addEventListener('click', () => {
      if (!currentKeyword) return;
      openDouban(currentKeyword);
    });

    btnResource.addEventListener('click', () => {
      if (!currentKeyword) return;
      const url = `https://www.xn--wcv59z.com/?s=${encodeURIComponent(currentKeyword)}`;
      openUrl(url);
      resultInfo.innerHTML += `<p style="color:#2d78b5">✓ 已打开资源站</p>`;
    });

    // 拖拽
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length > 0 && e.dataTransfer.files[0].type.startsWith('image/')) {
        handleImage(e.dataTransfer.files[0]);
      }
    });

    dropZone.addEventListener('click', (e) => {
      if (e.target.classList.contains('file-label') || e.target.closest('.file-label')) return;
      if (e.target.classList.contains('btn-clear') || e.target.closest('.btn-clear')) return;
      fileInput.click();
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleImage(e.target.files[0]);
    });

    document.addEventListener('paste', async (e) => {
      if (document.activeElement === searchInput) return;
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          if (item.getAsFile()) handleImage(item.getAsFile());
          return;
        }
      }
      const text = e.clipboardData.getData('text/plain');
      if (text && text.trim()) doSearch(text.trim());
    });

    clearImage.addEventListener('click', (e) => {
      e.stopPropagation();
      previewArea.style.display = 'none';
      dropContent.style.display = 'block';
      previewImage.src = '';
      ocrResult.textContent = '';
      fileInput.value = '';
    });

    async function handleImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImage.src = e.target.result;
        previewArea.style.display = 'flex';
        dropContent.style.display = 'none';
      };
      reader.readAsDataURL(file);

      ocrResult.textContent = '识别中...';
      resultModule.style.display = 'block';
      resultInfo.innerHTML = '<p>🔄 正在识别图片...</p>';

      try {
        const base64 = await fileToBase64(file);
        const text = await doOCR(base64, file.type);
        if (text && text.trim().length > 1) {
          const cleaned = cleanText(text);
          ocrResult.textContent = `识别结果: ${cleaned}`;
          resultInfo.innerHTML = `<p style="color:#218c38">✓ 识别成功: ${cleaned}</p>`;
          currentKeyword = cleaned;
          searchInput.value = cleaned;
          addHistory(cleaned);
          showResult(cleaned);
          openDouban(cleaned);
        } else {
          ocrResult.textContent = '未能识别';
          resultInfo.innerHTML = '<p style="color:#cc3333">❌ 未能识别文字</p>';
        }
      } catch (err) {
        ocrResult.textContent = '识别失败';
        resultInfo.innerHTML = `<p style="color:#cc3333">❌ ${err.message}</p>`;
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function doOCR(base64, mimeType) {
      if (window.Tesseract) {
        const result = await window.Tesseract.recognize(`data:${mimeType};base64,${base64}`, 'chi_sim+eng');
        return result.data.text;
      }
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        script.onload = async () => {
          try {
            const result = await window.Tesseract.recognize(`data:${mimeType};base64,${base64}`, 'chi_sim+eng');
            resolve(result.data.text);
          } catch (e) { reject(e); }
        };
        script.onerror = () => reject(new Error('无法加载OCR库'));
        document.head.appendChild(script);
      });
    }

    function cleanText(text) {
      return text.replace(/\s+/g, ' ').replace(/[「」『』【】《》\[\]\{\}]/g, '').trim().substring(0, 50);
    }

    function addHistory(text) {
      const now = new Date();
      const time = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
      searchHistory.unshift({ text, time });
      if (searchHistory.length > 20) searchHistory.pop();
      localStorage.setItem('douban-history', JSON.stringify(searchHistory));
      renderHistory();
    }

    function renderHistory() {
      if (searchHistory.length === 0) {
        historyList.innerHTML = '<p class="empty-hint">暂无记录</p>';
        return;
      }
      historyList.innerHTML = searchHistory.map(item =>
        `<div class="history-item" onclick="doSearch('${item.text.replace(/'/g, "\\'")}')">
          <span class="history-text">${item.text}</span>
          <span class="history-time">${item.time}</span>
        </div>`
      ).join('');
    }

    clearHistory.addEventListener('click', () => {
      searchHistory = [];
      localStorage.setItem('douban-history', '[]');
      renderHistory();
    });
  </script>
</body>
</html>
