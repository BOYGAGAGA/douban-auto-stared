<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豆瓣自动标记</title>
  <link rel="stylesheet" href="styles/douban.css">
</head>
<body>
  <!-- 全局顶栏 -->
  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="top-bar-left">
        <span class="top-link active">首页</span>
      </div>
    </div>
  </div>

  <!-- 页面导航 -->
  <div class="nav-bar">
    <div class="nav-bar-inner">
      <div class="nav-left">
        <span class="logo">豆瓣自动标记</span>
      </div>
      <div class="nav-right">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="输入电影、书籍、音乐名称，回车自动搜索..." autofocus />
          <button id="searchBtn" class="search-btn">搜索</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main-wrapper">
    <div class="main-content">
      <!-- 左侧主区域 -->
      <div class="content-left">
        <!-- 快速输入区 -->
        <div class="module">
          <div class="module-title">
            <span class="title-text">快速输入</span>
            <span class="title-dots">······</span>
            <span class="title-extra">粘贴文字或图片自动搜索并打开豆瓣</span>
          </div>
          <div class="drop-zone" id="dropZone">
            <div class="drop-zone-content" id="dropContent">
              <div class="drop-icon">📋</div>
              <p>在此处 <strong>Ctrl+V</strong> 粘贴文字或图片</p>
              <p>或拖拽图片到此处 · <label class="file-label" for="fileInput">选择图片文件</label></p>
              <input type="file" id="fileInput" accept="image/*" style="display:none" />
            </div>
            <div class="drop-zone-preview" id="previewArea" style="display:none">
              <img id="previewImage" />
              <div id="ocrResult" class="ocr-result"></div>
              <button class="btn-clear" id="clearImage">✕ 清除</button>
            </div>
          </div>
        </div>

        <!-- 状态信息 -->
        <div class="module" id="statusModule" style="display:none">
          <div class="module-title">
            <span class="title-text">操作状态</span>
            <span class="title-dots">······</span>
          </div>
          <div class="status-content" id="statusContent"></div>
        </div>

        <!-- 历史记录 -->
        <div class="module">
          <div class="module-title">
            <span class="title-text">最近搜索</span>
            <span class="title-dots">······</span>
            <span class="title-extra" id="clearHistory" style="cursor:pointer">清空</span>
          </div>
          <div class="history-list" id="historyList">
            <p class="empty-hint">暂无搜索记录</p>
          </div>
        </div>
      </div>

      <!-- 右侧边栏 -->
      <div class="content-right">
        <!-- 使用说明 -->
        <div class="module">
          <div class="module-title">
            <span class="title-text">使用说明</span>
            <span class="title-dots">······</span>
          </div>
          <div class="help-content">
            <p><strong>自动流程：</strong></p>
            <p>1. 输入文字或粘贴图片</p>
            <p>2. 自动打开豆瓣搜索结果</p>
            <p>3. 同时打开资源站搜索</p>
            <hr style="border:none;border-top:1px solid #eee;margin:10px 0">
            <p><strong>快捷键：</strong></p>
            <p>Enter - 搜索并打开</p>
            <p>Ctrl+V - 粘贴图片/文字</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 使用preload暴露的API
    const openExternal = (url) => window.electronAPI.openExternal(url);

    // 状态
    let searchHistory = JSON.parse(localStorage.getItem('douban-history') || '[]');

    // DOM元素
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const dropZone = document.getElementById('dropZone');
    const dropContent = document.getElementById('dropContent');
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const previewImage = document.getElementById('previewImage');
    const ocrResult = document.getElementById('ocrResult');
    const clearImage = document.getElementById('clearImage');
    const statusModule = document.getElementById('statusModule');
    const statusContent = document.getElementById('statusContent');
    const historyList = document.getElementById('historyList');
    const clearHistory = document.getElementById('clearHistory');

    // 初始化
    renderHistory();

    // 文字搜索 - 自动打开豆瓣
    searchBtn.addEventListener('click', () => doSearch(searchInput.value));
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch(searchInput.value);
    });

    function doSearch(text) {
      text = (text || '').trim();
      if (!text) return;
      searchInput.value = text;
      addHistory(text);
      openDoubanSearch(text);
    }

    // 打开豆瓣搜索（自动）
    function openDoubanSearch(keyword) {
      statusModule.style.display = 'block';
      statusContent.innerHTML = `<p>正在打开豆瓣搜索: <strong>${keyword}</strong></p>`;

      // 打开豆瓣搜索页面
      const url = `https://search.douban.com/movie/subject_search?search_text=${encodeURIComponent(keyword)}&cat=1002`;
      openExternal(url);

      // 同时打开资源站
      const resourceUrl = `https://www.xn--wcv59z.com/?s=${encodeURIComponent(keyword)}`;
      openExternal(resourceUrl);

      statusContent.innerHTML += `<p style="color:#218c38">✓ 已打开豆瓣和资源站搜索</p>`;
    }

    // 图片拖拽
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length > 0 && files[0].type.startsWith('image/')) {
        handleImage(files[0]);
      }
    });

    // 点击选择文件
    dropZone.addEventListener('click', (e) => {
      if (e.target.classList.contains('file-label') || e.target.closest('.file-label')) return;
      if (e.target.classList.contains('btn-clear') || e.target.closest('.btn-clear')) return;
      fileInput.click();
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleImage(e.target.files[0]);
    });

    // 粘贴处理
    document.addEventListener('paste', async (e) => {
      if (document.activeElement === searchInput) return;

      const items = e.clipboardData?.items;
      if (!items) return;

      // 检查图片
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          if (file) handleImage(file);
          return;
        }
      }

      // 检查文字
      const text = e.clipboardData.getData('text/plain');
      if (text && text.trim()) {
        doSearch(text.trim());
      }
    });

    // 清除图片
    clearImage.addEventListener('click', (e) => {
      e.stopPropagation();
      previewArea.style.display = 'none';
      dropContent.style.display = 'block';
      previewImage.src = '';
      ocrResult.textContent = '';
      fileInput.value = '';
    });

    // 处理图片 - OCR识别后自动打开豆瓣
    async function handleImage(file) {
      // 显示预览
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImage.src = e.target.result;
        previewArea.style.display = 'flex';
        dropContent.style.display = 'none';
      };
      reader.readAsDataURL(file);

      // OCR识别
      statusModule.style.display = 'block';
      statusContent.innerHTML = '<p>🔄 正在识别图片文字...</p>';
      ocrResult.textContent = '识别中...';

      try {
        // 转base64
        const base64 = await fileToBase64(file);

        // 调用OCR
        const text = await doOCR(base64, file.type);
        if (text && text.trim().length > 1) {
          const cleaned = cleanText(text);
          ocrResult.textContent = `识别结果: ${cleaned}`;
          statusContent.innerHTML = `<p style="color:#218c38">✓ 识别成功: ${cleaned}</p>`;

          // 自动搜索并打开
          searchInput.value = cleaned;
          doSearch(cleaned);
        } else {
          ocrResult.textContent = '未能识别出文字';
          statusContent.innerHTML = '<p style="color:#cc3333">❌ 未能识别出文字内容</p>';
        }
      } catch (err) {
        ocrResult.textContent = '识别失败';
        statusContent.innerHTML = `<p style="color:#cc3333">❌ 识别失败: ${err.message}</p>`;
      }
    }

    // 文件转base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(',')[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // OCR识别
    async function doOCR(base64, mimeType) {
      // 尝试使用window.Tesseract（如果已加载）
      if (window.Tesseract) {
        const result = await window.Tesseract.recognize(`data:${mimeType};base64,${base64}`, 'chi_sim+eng');
        return result.data.text;
      }

      // 否则尝试动态加载
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        script.onload = async () => {
          try {
            const result = await window.Tesseract.recognize(`data:${mimeType};base64,${base64}`, 'chi_sim+eng');
            resolve(result.data.text);
          } catch (e) {
            reject(e);
          }
        };
        script.onerror = () => reject(new Error('无法加载OCR库，请检查网络连接'));
        document.head.appendChild(script);
      });
    }

    // 清理OCR文本
    function cleanText(text) {
      return text
        .replace(/\s+/g, ' ')
        .replace(/[「」『』【】《》\[\]\{\}]/g, '')
        .trim()
        .substring(0, 50);
    }

    // 历史记录
    function addHistory(text) {
      const now = new Date();
      const time = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
      searchHistory.unshift({ text, time });
      if (searchHistory.length > 20) searchHistory.pop();
      localStorage.setItem('douban-history', JSON.stringify(searchHistory));
      renderHistory();
    }

    function renderHistory() {
      if (searchHistory.length === 0) {
        historyList.innerHTML = '<p class="empty-hint">暂无搜索记录</p>';
        return;
      }
      historyList.innerHTML = searchHistory.map(item =>
        `<div class="history-item" onclick="doSearch('${item.text.replace(/'/g, "\\'")}')">
          <span class="history-text">${item.text}</span>
          <span class="history-time">${item.time}</span>
        </div>`
      ).join('');
    }

    clearHistory.addEventListener('click', () => {
      searchHistory = [];
      localStorage.setItem('douban-history', '[]');
      renderHistory();
    });
  </script>
</body>
</html>
